<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" role="img"
     shape-rendering="geometricPrecision" text-rendering="optimizeLegibility"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
<title>AI Code Review Loop</title>
<desc>Left-to-right code review flow: Open PR, AI Review Agent (emphasized), Human Reviewer, Patch and Verify, Merge Ready, with a dashed feedback loop for re-review after a patch.</desc>
<style>
  svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#DCE3EC;
    --b1:#1F6FB2; --b1t:#DCEBFA; --b1k:#124267;
    --p:#534AB7; --pt:#DEDCF6; --pk:#322B7A;
    --am:#B5771F; --amt:#F5E4C4; --amk:#7A4E12;
    --cy:#0E7C90; --cyt:#CDEAEF; --cyk:#084A57;
    --gr:#0F7A5F; --grt:#D3EEE2; --grk:#085041; }
  text{ fill:var(--ink) }
  .num{ font-size:15px; font-weight:700; fill:#FFFFFF }
  .ct{ font-size:22px; font-weight:700 }
  .cs{ font-size:13px; fill:var(--muted) }
  .bl{ font-size:16px }
  .ic{ fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round }
</style>
<defs>
  <marker id="arw" viewBox="0 0 9 9" refX="7" refY="4" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0.5,0.5 L8,4 L0.5,7.5 z" fill="#5B6675"/></marker>
  <marker id="arwfb" viewBox="0 0 9 9" refX="7" refY="4" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0.5,0.5 L8,4 L0.5,7.5 z" fill="#534AB7"/></marker>
  <filter id="soft" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#534AB7" flood-opacity="0.22"/></filter>
  <symbol id="ic-terminal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M7 9l3 3-3 3"/><path d="M13 15h4"/></symbol>
  <symbol id="ic-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
  <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6M9 9.5h2"/></symbol>
  <symbol id="ic-loop" viewBox="0 0 24 24"><path d="M4.5 12a7.5 7.5 0 0 1 12.8-5.3L20 9"/><path d="M20 3.5V9h-5.5"/><path d="M19.5 12a7.5 7.5 0 0 1-12.8 5.3L4 15"/><path d="M4 20.5V15h5.5"/></symbol>
  <symbol id="ic-shield" viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></symbol>
</defs>
<rect width="1600" height="720" fill="var(--bg)"/>

<!-- header -->
<rect x="44" y="40" width="6" height="46" rx="3" fill="var(--p)"/>
<text x="66" y="64" style="font-size:32px;font-weight:800">AI Code Review Loop</text>
<text x="66" y="94" class="cs" style="font-size:16px">From PR to merge — AI review · human approval · re-review, in one flow</text>

<!-- solid arrows -->
<line x1="326" y1="300" x2="350" y2="300" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
<line x1="634" y1="300" x2="658" y2="300" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
<line x1="942" y1="300" x2="966" y2="300" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
<line x1="1250" y1="300" x2="1274" y2="300" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>

<!-- feedback loop: Patch(4) -> AI Review(2) -->
<path d="M1108 526 V566 H492 V526" fill="none" stroke="var(--p)" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arwfb)"/>
<rect x="690" y="551" width="220" height="30" rx="15" fill="#FFFFFF" stroke="var(--p)" stroke-width="1"/>
<text x="800" y="566" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--p)">Re-review after patch</text>

<!-- Card 1: Open PR -->
<rect x="44" y="150" width="280" height="368" rx="16" fill="#FFFFFF" stroke="var(--b1)" stroke-width="1.4"/>
<circle cx="72" cy="178" r="15" fill="var(--b1)"/><text x="72" y="178" class="num" text-anchor="middle" dominant-baseline="central">1</text>
<circle cx="184" cy="238" r="36" fill="var(--b1t)"/><use href="#ic-terminal" class="ic" x="164" y="218" width="40" height="40" style="color:var(--b1)"/>
<text x="184" y="316" class="ct" text-anchor="middle" dominant-baseline="central" style="fill:var(--b1k)">Open PR</text>
<text x="184" y="342" class="cs" text-anchor="middle" dominant-baseline="central">Developer opens PR</text>
<line x1="68" y1="372" x2="300" y2="372" stroke="var(--hair)"/>
<circle cx="80" cy="410" r="2.6" fill="var(--b1)"/><text x="94" y="410" class="bl" dominant-baseline="central">Code changes</text>
<circle cx="80" cy="446" r="2.6" fill="var(--b1)"/><text x="94" y="446" class="bl" dominant-baseline="central">Attach test results</text>

<!-- Card 2: AI Review Agent (KEY STEP) -->
<rect x="352" y="150" width="280" height="368" rx="16" fill="#F3F2FC" stroke="var(--p)" stroke-width="2.6" filter="url(#soft)"/>
<circle cx="380" cy="178" r="15" fill="var(--p)"/><text x="380" y="178" class="num" text-anchor="middle" dominant-baseline="central">2</text>
<rect x="516" y="166" width="96" height="24" rx="12" fill="var(--p)"/><text x="564" y="178" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#FFFFFF;letter-spacing:.5px">KEY STEP</text>
<circle cx="492" cy="238" r="38" fill="var(--p)"/><use href="#ic-gear" class="ic" x="471" y="217" width="42" height="42" style="color:#FFFFFF"/>
<text x="492" y="316" class="ct" text-anchor="middle" dominant-baseline="central" style="fill:var(--pk)">AI Review Agent</text>
<text x="492" y="342" class="cs" text-anchor="middle" dominant-baseline="central" style="fill:#6B63C0">Automated diff review</text>
<line x1="376" y1="372" x2="608" y2="372" stroke="#D7D4F3"/>
<circle cx="388" cy="404" r="2.6" fill="var(--p)"/><text x="402" y="404" class="bl" dominant-baseline="central">Analyze diff</text>
<circle cx="388" cy="440" r="2.6" fill="var(--p)"/><text x="402" y="440" class="bl" dominant-baseline="central">Flag risky spots</text>
<circle cx="388" cy="476" r="2.6" fill="var(--p)"/><text x="402" y="476" class="bl" dominant-baseline="central">Check missing tests</text>

<!-- Card 3: Human Reviewer -->
<rect x="660" y="150" width="280" height="368" rx="16" fill="#FFFFFF" stroke="var(--am)" stroke-width="1.4"/>
<circle cx="688" cy="178" r="15" fill="var(--am)"/><text x="688" y="178" class="num" text-anchor="middle" dominant-baseline="central">3</text>
<circle cx="800" cy="238" r="36" fill="var(--amt)"/><use href="#ic-doc" class="ic" x="780" y="218" width="40" height="40" style="color:var(--am)"/>
<text x="800" y="316" class="ct" text-anchor="middle" dominant-baseline="central" style="fill:var(--amk)">Human Reviewer</text>
<text x="800" y="342" class="cs" text-anchor="middle" dominant-baseline="central">Human review &amp; triage</text>
<line x1="684" y1="372" x2="916" y2="372" stroke="var(--hair)"/>
<circle cx="696" cy="410" r="2.6" fill="var(--am)"/><text x="710" y="410" class="bl" dominant-baseline="central">Review flagged comments</text>
<circle cx="696" cy="446" r="2.6" fill="var(--am)"/><text x="710" y="446" class="bl" dominant-baseline="central">Clear false positives</text>

<!-- Card 4: Patch & Verify -->
<rect x="968" y="150" width="280" height="368" rx="16" fill="#FFFFFF" stroke="var(--cy)" stroke-width="1.4"/>
<circle cx="996" cy="178" r="15" fill="var(--cy)"/><text x="996" y="178" class="num" text-anchor="middle" dominant-baseline="central">4</text>
<circle cx="1108" cy="238" r="36" fill="var(--cyt)"/><use href="#ic-loop" class="ic" x="1088" y="218" width="40" height="40" style="color:var(--cy)"/>
<text x="1108" y="316" class="ct" text-anchor="middle" dominant-baseline="central" style="fill:var(--cyk)">Patch &amp; Verify</text>
<text x="1108" y="342" class="cs" text-anchor="middle" dominant-baseline="central">Fix and re-test</text>
<line x1="992" y1="372" x2="1224" y2="372" stroke="var(--hair)"/>
<circle cx="1004" cy="410" r="2.6" fill="var(--cy)"/><text x="1018" y="410" class="bl" dominant-baseline="central">Apply fixes</text>
<circle cx="1004" cy="446" r="2.6" fill="var(--cy)"/><text x="1018" y="446" class="bl" dominant-baseline="central">Re-run tests</text>

<!-- Card 5: Merge Ready -->
<rect x="1276" y="150" width="280" height="368" rx="16" fill="var(--grt)" stroke="var(--gr)" stroke-width="1.6"/>
<circle cx="1304" cy="178" r="15" fill="var(--gr)"/><text x="1304" y="178" class="num" text-anchor="middle" dominant-baseline="central">5</text>
<circle cx="1416" cy="238" r="36" fill="#FFFFFF"/><use href="#ic-shield" class="ic" x="1396" y="218" width="40" height="40" style="color:var(--gr)"/>
<text x="1416" y="316" class="ct" text-anchor="middle" dominant-baseline="central" style="fill:var(--grk)">Merge Ready</text>
<text x="1416" y="342" class="cs" text-anchor="middle" dominant-baseline="central" style="fill:var(--grk)">Approved &amp; merged</text>
<line x1="1300" y1="372" x2="1532" y2="372" stroke="#C4E6D6"/>
<circle cx="1312" cy="410" r="2.6" fill="var(--gr)"/><text x="1326" y="410" class="bl" dominant-baseline="central">Approval complete</text>
<circle cx="1312" cy="446" r="2.6" fill="var(--gr)"/><text x="1326" y="446" class="bl" dominant-baseline="central">Merge PR</text>

<!-- legend -->
<line x1="66" y1="662" x2="126" y2="662" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
<text x="138" y="662" style="font-size:15px;fill:#3F4453" dominant-baseline="central">solid = normal path</text>
<line x1="392" y1="662" x2="452" y2="662" stroke="var(--p)" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arwfb)"/>
<text x="464" y="662" style="font-size:15px;fill:#3F4453" dominant-baseline="central">dashed = feedback loop</text>
</svg>
