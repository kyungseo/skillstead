<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 710" width="1600" height="710" role="img"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>AI Code Review Loop</title>
  <desc>Left-to-right code review process flow: Open PR to AI Review Agent to Human Reviewer to Patch and Verify to Merge Ready. AI review step emphasized, with a dashed feedback loop for re-review after patch.</desc>

  <style>
    svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#DCE4EE; }
    text{ fill:var(--ink) }
  </style>

  <defs>
    <marker id="arw" viewBox="0 0 9 9" refX="7" refY="4" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0.5,0.5 L8,4 L0.5,7.5 z" fill="#5B6675"/>
    </marker>
    <marker id="arwfb" viewBox="0 0 9 9" refX="7" refY="4" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0.5,0.5 L8,4 L0.5,7.5 z" fill="#534AB7"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#534AB7" flood-opacity="0.20"/>
    </filter>

    <symbol id="ic-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M7 9l3 3-3 3"/><path d="M13 15h4"/></symbol>
    <symbol id="ic-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6M9 9.5h2"/></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12a7.5 7.5 0 0 1 12.8-5.3L20 9"/><path d="M20 3.5V9h-5.5"/><path d="M19.5 12a7.5 7.5 0 0 1-12.8 5.3L4 15"/><path d="M4 20.5V15h5.5"/></symbol>
    <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="710" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="70" y="56" font-size="34" font-weight="700" fill="#1F2733">AI Code Review Loop</text>
  <text x="70" y="88" font-size="17" fill="#5B6675">From PR to merge &#8212; AI review · human approval · re-review, in one flow</text>

  <!-- ===================== Solid path arrows (normal) ===================== -->
  <line x1="338" y1="360" x2="360" y2="360" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="638" y1="360" x2="660" y2="360" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="938" y1="360" x2="960" y2="360" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="1238" y1="360" x2="1260" y2="360" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- ===================== Feedback loop (dashed) : Patch -> AI Review ===================== -->
  <path d="M1100 552 V600 H500 V562" fill="none" stroke="#534AB7" stroke-width="2.2"
        stroke-dasharray="6 5" marker-end="url(#arwfb)"/>
  <text x="800" y="590" font-size="15" font-weight="600" text-anchor="middle" fill="#534AB7">Re-review after patch · re-check tests</text>

  <!-- ===================== Card 1 : Open PR (blue) ===================== -->
  <rect x="70" y="170" width="260" height="380" rx="16" fill="#EEF5FC" stroke="#1F6FB2" stroke-width="1.3"/>
  <circle cx="98" cy="198" r="15" fill="#1F6FB2"/>
  <text x="98" y="198" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">1</text>
  <circle cx="200" cy="264" r="37" fill="#DCEBFA"/>
  <use href="#ic-terminal" x="180" y="244" width="40" height="40" style="color:#1F6FB2"/>
  <text x="200" y="350" font-size="23" font-weight="700" fill="#124267" text-anchor="middle" dominant-baseline="central">Open PR</text>
  <text x="200" y="376" font-size="13" fill="#5B6675" text-anchor="middle" dominant-baseline="central">Developer opens PR</text>
  <line x1="94" y1="398" x2="306" y2="398" stroke="#CBDDF0" stroke-width="1"/>
  <circle cx="102" cy="448" r="2.6" fill="#1F6FB2"/><text x="114" y="448" font-size="17" fill="#1F2733" dominant-baseline="central">Code changes</text>
  <circle cx="102" cy="484" r="2.6" fill="#1F6FB2"/><text x="114" y="484" font-size="17" fill="#1F2733" dominant-baseline="central">Attach test results</text>

  <!-- ===================== Card 2 : AI Review Agent (purple, EMPHASIZED) ===================== -->
  <rect x="370" y="170" width="260" height="380" rx="16" fill="#ECEBFB" stroke="#534AB7" stroke-width="2.4" filter="url(#soft)"/>
  <circle cx="398" cy="200" r="15" fill="#534AB7"/>
  <text x="398" y="200" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="600" y="196" font-size="12" font-weight="700" fill="#534AB7" text-anchor="end" letter-spacing="1">KEY STEP</text>
  <circle cx="500" cy="266" r="38" fill="#534AB7"/>
  <use href="#ic-gear" x="479" y="245" width="42" height="42" style="color:#FFFFFF"/>
  <text x="500" y="352" font-size="23" font-weight="700" fill="#322B7A" text-anchor="middle" dominant-baseline="central">AI Review Agent</text>
  <text x="500" y="378" font-size="13" fill="#6B63C0" text-anchor="middle" dominant-baseline="central">Automated diff review</text>
  <line x1="394" y1="400" x2="606" y2="400" stroke="#C9C5F0" stroke-width="1"/>
  <circle cx="402" cy="432" r="2.6" fill="#534AB7"/><text x="414" y="432" font-size="17" fill="#1F2733" dominant-baseline="central">Analyze diff</text>
  <circle cx="402" cy="468" r="2.6" fill="#534AB7"/><text x="414" y="468" font-size="17" fill="#1F2733" dominant-baseline="central">Flag risky spots</text>
  <circle cx="402" cy="504" r="2.6" fill="#534AB7"/><text x="414" y="504" font-size="17" fill="#1F2733" dominant-baseline="central">Check missing tests</text>

  <!-- ===================== Card 3 : Human Reviewer (amber) ===================== -->
  <rect x="670" y="170" width="260" height="380" rx="16" fill="#FBF2E1" stroke="#B5771F" stroke-width="1.3"/>
  <circle cx="698" cy="198" r="15" fill="#B5771F"/>
  <text x="698" y="198" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">3</text>
  <circle cx="800" cy="264" r="37" fill="#F5E4C4"/>
  <use href="#ic-doc" x="780" y="244" width="40" height="40" style="color:#B5771F"/>
  <text x="800" y="350" font-size="23" font-weight="700" fill="#7A4E12" text-anchor="middle" dominant-baseline="central">Human Reviewer</text>
  <text x="800" y="376" font-size="13" fill="#5B6675" text-anchor="middle" dominant-baseline="central">Human review &amp; triage</text>
  <line x1="694" y1="398" x2="906" y2="398" stroke="#E7D3A9" stroke-width="1"/>
  <circle cx="702" cy="448" r="2.6" fill="#B5771F"/><text x="714" y="448" font-size="17" fill="#1F2733" dominant-baseline="central">Review flagged comments</text>
  <circle cx="702" cy="484" r="2.6" fill="#B5771F"/><text x="714" y="484" font-size="17" fill="#1F2733" dominant-baseline="central">Clear false positives</text>

  <!-- ===================== Card 4 : Patch & Verify (cyan) ===================== -->
  <rect x="970" y="170" width="260" height="380" rx="16" fill="#E4F4F6" stroke="#0E7C90" stroke-width="1.3"/>
  <circle cx="998" cy="198" r="15" fill="#0E7C90"/>
  <text x="998" y="198" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">4</text>
  <circle cx="1100" cy="264" r="37" fill="#CDEAEF"/>
  <use href="#ic-loop" x="1080" y="244" width="40" height="40" style="color:#0E7C90"/>
  <text x="1100" y="350" font-size="23" font-weight="700" fill="#084A57" text-anchor="middle" dominant-baseline="central">Patch &amp; Verify</text>
  <text x="1100" y="376" font-size="13" fill="#5B6675" text-anchor="middle" dominant-baseline="central">Fix and re-test</text>
  <line x1="994" y1="398" x2="1206" y2="398" stroke="#BEE2E8" stroke-width="1"/>
  <circle cx="1002" cy="448" r="2.6" fill="#0E7C90"/><text x="1014" y="448" font-size="17" fill="#1F2733" dominant-baseline="central">Apply fixes</text>
  <circle cx="1002" cy="484" r="2.6" fill="#0E7C90"/><text x="1014" y="484" font-size="17" fill="#1F2733" dominant-baseline="central">Re-run tests</text>

  <!-- ===================== Card 5 : Merge Ready (green) ===================== -->
  <rect x="1270" y="170" width="260" height="380" rx="16" fill="#E7F5EF" stroke="#0F7A5F" stroke-width="1.3"/>
  <circle cx="1298" cy="198" r="15" fill="#0F7A5F"/>
  <text x="1298" y="198" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">5</text>
  <circle cx="1400" cy="264" r="37" fill="#D3EEE2"/>
  <use href="#ic-shield" x="1380" y="244" width="40" height="40" style="color:#0F7A5F"/>
  <text x="1400" y="350" font-size="23" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">Merge Ready</text>
  <text x="1400" y="376" font-size="13" fill="#5B6675" text-anchor="middle" dominant-baseline="central">Approved &amp; merged</text>
  <line x1="1294" y1="398" x2="1506" y2="398" stroke="#C4E6D6" stroke-width="1"/>
  <circle cx="1302" cy="448" r="2.6" fill="#0F7A5F"/><text x="1314" y="448" font-size="17" fill="#1F2733" dominant-baseline="central">Approval complete</text>
  <circle cx="1302" cy="484" r="2.6" fill="#0F7A5F"/><text x="1314" y="484" font-size="17" fill="#1F2733" dominant-baseline="central">Merge PR</text>

  <!-- ===================== Legend ===================== -->
  <line x1="90" y1="662" x2="150" y2="662" stroke="#5B6675" stroke-width="2.2" marker-end="url(#arw)"/>
  <text x="162" y="662" font-size="15" fill="#3F4453" dominant-baseline="central">solid arrow = normal path</text>
  <line x1="470" y1="662" x2="530" y2="662" stroke="#534AB7" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arwfb)"/>
  <text x="542" y="662" font-size="15" fill="#3F4453" dominant-baseline="central">dashed arrow = feedback loop</text>
</svg>
