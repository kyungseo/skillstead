<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" role="img" style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>Zero Trust — 신뢰는 상속되지 않는다</title>
  <desc>zero-trust 접근을 나타낸 nested onion 모델: 네트워크 경계, identity, 디바이스·워크로드 링이 최소 권한 데이터 코어를 감싼다. 신뢰는 각 링에서 요청마다 다시 세워지며, 네트워크에 도달했다는 사실은 아무것도 보장하지 않는다.</desc>
  <style>
    svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#D6E0EC; --primary:#1F6FB2;
      --r1-fill:#F3F7FB; --r1-line:#B9CCDF; --r1-ink:#4A6787;
      --r2-fill:#E8F1FB; --r2-line:#1F6FB2; --r2-ink:#124267;
      --r3-fill:#ECEBFB; --r3-line:#534AB7; --r3-ink:#3C3489;
      --core-fill:#DFF2E9; --core-line:#0F7A5F; --core-ink:#085041; }
    .on-accent{ fill:#FFFFFF }
  </style>
  <defs>
    <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></symbol>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F3D2E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="var(--bg)"/>

  <!-- header -->
  <rect x="48" y="52" width="6" height="64" rx="3" fill="var(--primary)"/>
  <text x="72" y="90" font-size="40" font-weight="800" fill="var(--ink)">Zero Trust — 신뢰는 상속되지 않는다</text>
  <text x="72" y="126" font-size="17" fill="var(--muted)">각 계층이 요청마다 신뢰를 다시 세운다 — 네트워크에 닿았다는 사실은 아무것도 보장하지 않는다</text>

  <!-- ring 1 · network edge -->
  <rect x="250" y="185" width="900" height="645" rx="26" fill="var(--r1-fill)" stroke="var(--r1-line)" stroke-width="1"/>
  <text x="700" y="217" font-size="21" font-weight="700" fill="var(--r1-ink)" text-anchor="middle" dominant-baseline="central">네트워크 경계 — 도달했다고 신뢰하지 않는다</text>

  <!-- ring 2 · identity -->
  <rect x="315" y="250" width="770" height="515" rx="22" fill="var(--r2-fill)" stroke="var(--r2-line)" stroke-width="1"/>
  <text x="700" y="282" font-size="21" font-weight="700" fill="var(--r2-ink)" text-anchor="middle" dominant-baseline="central">Identity &amp; Access — 모든 요청을 인증한다</text>

  <!-- ring 3 · device & workload -->
  <rect x="380" y="315" width="640" height="385" rx="18" fill="var(--r3-fill)" stroke="var(--r3-line)" stroke-width="1"/>
  <text x="700" y="347" font-size="21" font-weight="700" fill="var(--r3-ink)" text-anchor="middle" dominant-baseline="central">디바이스 &amp; 워크로드 — 상태를 상시 점검한다</text>

  <!-- core · data -->
  <rect x="445" y="380" width="510" height="255" rx="16" fill="var(--core-fill)" stroke="var(--core-line)" stroke-width="2" filter="url(#soft)"/>
  <circle cx="700" cy="473" r="36" fill="#FFFFFF"/>
  <use href="#ic-shield" x="680" y="453" width="40" height="40" style="color:#0F7A5F"/>
  <text x="700" y="538" font-size="26" font-weight="800" fill="var(--core-ink)" text-anchor="middle" dominant-baseline="central">데이터</text>
  <text x="700" y="568" font-size="17" fill="var(--core-ink)" text-anchor="middle" dominant-baseline="central">기본값은 최소 권한</text>

  <!-- footer rule of thumb -->
  <rect x="300" y="850" width="800" height="34" rx="17" fill="#F1F4F8"/>
  <text x="700" y="867" font-size="15" fill="var(--muted)" text-anchor="middle" dominant-baseline="central">모든 계층에서 명시적으로 검증 · 침해를 전제 · 최소 권한만 부여</text>
</svg>
