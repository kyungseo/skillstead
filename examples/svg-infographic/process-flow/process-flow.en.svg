<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 540" width="1240" height="540" role="img"
     shape-rendering="geometricPrecision" text-rendering="optimizeLegibility"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
<title>RAG query pipeline — process flow</title>
<desc>A left-to-right process flow for retrieval-augmented generation: user query, embed, vector search, augmented prompt, and generate answer.</desc>
<style>
  svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#DCE3EC; --primary:#1F6FB2; --pf-tint:#E3EEF8;
    --band:#F7FAFD; --ok-fill:#E7F5EF; --ok-line:#0F7A5F; --ok-ink:#0B5E49; --ok-tint:#D0EBDF; }
  text{ fill:var(--ink) }
  .sub{ fill:var(--muted) }
  .ct{ font-size:17px; font-weight:700 }
  .cs{ font-size:13px }
  .ic{ fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" data-lint-allow="marker-footprint" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A94A3"/></marker>
  <symbol id="ic-chat" viewBox="0 0 24 24"><path d="M4 5h16v11H9l-4 4V5z"/><path d="M8 10h8M8 13h5"/></symbol>
  <symbol id="ic-api" viewBox="0 0 24 24"><path d="M9 5l-4 7 4 7M15 5l4 7-4 7"/></symbol>
  <symbol id="ic-database" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v14c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 12c0 1.7 3.1 3 7 3s7-1.3 7-3"/></symbol>
  <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6M9 9.5h2"/></symbol>
  <symbol id="ic-spark" viewBox="0 0 24 24"><path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2z"/></symbol>
</defs>
<rect width="1240" height="540" fill="var(--bg)"/>

<!-- header -->
<rect x="44" y="40" width="6" height="46" rx="3" fill="var(--primary)"/>
<text x="66" y="64" style="font-size:32px;font-weight:800">RAG Query Pipeline</text>
<text x="66" y="94" class="sub" style="font-size:16px">Retrieval-augmented generation — retrieved context grounds the model before it answers</text>

<!-- band container -->
<rect x="44" y="130" width="1152" height="290" rx="18" fill="var(--band)" stroke="var(--hair)"/>
<rect x="68" y="152" width="150" height="32" rx="16" fill="var(--primary)"/>
<text x="143" y="169" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:700;fill:#FFFFFF">RAG PIPELINE</text>

<!-- 5 flow cards · cardW=200, pitch=224, x=72..968 → last right edge 1168 < band right 1196 -->
<g>
  <rect x="72" y="204" width="200" height="176" rx="14" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="172" cy="254" r="28" fill="var(--pf-tint)"/><use href="#ic-chat" class="ic" x="154" y="236" width="36" height="36" style="color:var(--primary)"/>
  <text x="172" y="308" text-anchor="middle" dominant-baseline="central" class="ct">User Query</text>
  <text x="172" y="332" text-anchor="middle" dominant-baseline="central" class="sub cs">the question</text>

  <rect x="296" y="204" width="200" height="176" rx="14" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="396" cy="254" r="28" fill="var(--pf-tint)"/><use href="#ic-api" class="ic" x="378" y="236" width="36" height="36" style="color:var(--primary)"/>
  <text x="396" y="308" text-anchor="middle" dominant-baseline="central" class="ct">Embed</text>
  <text x="396" y="332" text-anchor="middle" dominant-baseline="central" class="sub cs">text → vector</text>

  <rect x="520" y="204" width="200" height="176" rx="14" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="620" cy="254" r="28" fill="var(--pf-tint)"/><use href="#ic-database" class="ic" x="602" y="236" width="36" height="36" style="color:var(--primary)"/>
  <text x="620" y="308" text-anchor="middle" dominant-baseline="central" class="ct">Vector Search</text>
  <text x="620" y="332" text-anchor="middle" dominant-baseline="central" class="sub cs">top-k retrieve</text>

  <rect x="744" y="204" width="200" height="176" rx="14" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="844" cy="254" r="28" fill="var(--pf-tint)"/><use href="#ic-doc" class="ic" x="826" y="236" width="36" height="36" style="color:var(--primary)"/>
  <text x="844" y="308" text-anchor="middle" dominant-baseline="central" class="ct">Augment</text>
  <text x="844" y="332" text-anchor="middle" dominant-baseline="central" class="sub cs">query + context</text>

  <rect x="968" y="204" width="200" height="176" rx="14" fill="var(--ok-fill)" stroke="var(--ok-line)" stroke-width="1.6"/>
  <circle cx="1068" cy="254" r="28" fill="var(--ok-tint)"/><use href="#ic-spark" class="ic" x="1050" y="236" width="36" height="36" style="color:var(--ok-line)"/>
  <text x="1068" y="308" text-anchor="middle" dominant-baseline="central" class="ct" style="fill:var(--ok-ink)">Generate</text>
  <text x="1068" y="332" text-anchor="middle" dominant-baseline="central" class="cs" style="fill:var(--ok-ink)">LLM → answer</text>
</g>

<!-- arrows (between card edges) -->
<line x1="274" y1="292" x2="294" y2="292" stroke="#8A94A3" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="498" y1="292" x2="518" y2="292" stroke="#8A94A3" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="722" y1="292" x2="742" y2="292" stroke="#8A94A3" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="946" y1="292" x2="966" y2="292" stroke="#8A94A3" stroke-width="2" marker-end="url(#arrow)"/>

<!-- footer note -->
<rect x="44" y="446" width="1152" height="58" rx="14" fill="var(--band)" stroke="var(--hair)"/>
<text x="620" y="475" text-anchor="middle" dominant-baseline="central" style="font-size:15px;font-weight:600;fill:var(--primary)">Retrieved top-k context is added to the prompt so the model answers from grounded facts, not memory alone.</text>
</svg>
