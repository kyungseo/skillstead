<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img"
  style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>RAG 질의 파이프라인 — 프로세스 플로우</title>
  <desc>검색 증강 생성의 좌→우 프로세스 플로우: 사용자 질의, 임베딩, 벡터 검색, 컨텍스트 결합, 답변 생성.</desc>
  <style>
    svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#D6E0EC; --primary:#1F6FB2; --card:#F7FAFD;
      --ok-fill:#E7F5EF; --ok-line:#0F7A5F; --ok-ink:#0B5E49; }
    text{ fill:var(--ink) }
    .sub{ fill:var(--muted) }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto"><path d="M1,1 L8,5 L1,9" fill="none" stroke="#8A94A3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <symbol id="ic-chat" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H9l-4 4V5z"/><path d="M8 10h8M8 13h5"/></symbol>
    <symbol id="ic-api" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l-4 7 4 7M15 5l4 7-4 7"/></symbol>
    <symbol id="ic-database" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v14c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 12c0 1.7 3.1 3 7 3s7-1.3 7-3"/></symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6M9 9.5h2"/></symbol>
    <symbol id="ic-spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2z"/></symbol>
  </defs>

  <rect x="0" y="0" width="1200" height="480" fill="var(--bg)"/>

  <!-- title -->
  <rect x="50" y="44" width="9" height="46" rx="3" fill="var(--primary)"/>
  <text x="76" y="74" style="font-size:34px;font-weight:800">RAG 질의 파이프라인</text>
  <text x="76" y="104" class="sub" style="font-size:18px">검색 증강 생성 — 좌→우 플로우</text>

  <g>
    <rect x="40" y="200" width="200" height="150" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="140" cy="248" r="25" fill="#E3EEF8"/><use href="#ic-chat" x="123" y="231" width="34" height="34" style="color:#1F6FB2"/>
    <text x="140" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700">사용자 질의</text>
    <text x="140" y="320" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:13px">질문</text>

    <rect x="270" y="200" width="200" height="150" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="370" cy="248" r="25" fill="#E3EEF8"/><use href="#ic-api" x="353" y="231" width="34" height="34" style="color:#1F6FB2"/>
    <text x="370" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700">임베딩</text>
    <text x="370" y="320" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:13px">텍스트 → 벡터</text>

    <rect x="500" y="200" width="200" height="150" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="600" cy="248" r="25" fill="#E3EEF8"/><use href="#ic-database" x="583" y="231" width="34" height="34" style="color:#1F6FB2"/>
    <text x="600" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700">벡터 검색</text>
    <text x="600" y="320" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:13px">top-k 검색</text>

    <rect x="730" y="200" width="200" height="150" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="830" cy="248" r="25" fill="#E3EEF8"/><use href="#ic-doc" x="813" y="231" width="34" height="34" style="color:#1F6FB2"/>
    <text x="830" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700">컨텍스트 결합</text>
    <text x="830" y="320" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:13px">질의 + 문맥</text>

    <rect x="960" y="200" width="200" height="150" rx="14" style="fill:var(--ok-fill);stroke:var(--ok-line);stroke-width:1.5"/>
    <circle cx="1060" cy="248" r="25" fill="#FFFFFF"/><use href="#ic-spark" x="1043" y="231" width="34" height="34" style="color:var(--ok-line)"/>
    <text x="1060" y="296" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:var(--ok-ink)">생성</text>
    <text x="1060" y="320" text-anchor="middle" dominant-baseline="central" style="font-size:13px;fill:var(--ok-ink)">LLM → 답변</text>
  </g>

  <line x1="240" y1="275" x2="270" y2="275" stroke="#8A94A3" stroke-width="1.7" marker-end="url(#arrow)"/>
  <line x1="470" y1="275" x2="500" y2="275" stroke="#8A94A3" stroke-width="1.7" marker-end="url(#arrow)"/>
  <line x1="700" y1="275" x2="730" y2="275" stroke="#8A94A3" stroke-width="1.7" marker-end="url(#arrow)"/>
  <line x1="930" y1="275" x2="960" y2="275" stroke="#8A94A3" stroke-width="1.7" marker-end="url(#arrow)"/>

  <text x="600" y="420" text-anchor="middle" class="sub" style="font-size:14px">실선 = 요청 경로 · 검색된 문맥이 모델이 답하기 전 근거가 된다</text>
</svg>
