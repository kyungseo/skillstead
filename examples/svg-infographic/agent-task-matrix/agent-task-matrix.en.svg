<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1070" width="1300" height="1070" role="img"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>AI Agent Task Selection Matrix</title>
  <desc>A 2x2 decision matrix split by scope (horizontal: narrow to broad) and uncertainty (vertical: low to high). Four quadrants — Quick Fix, Guided Change, Investigation, Design Review — each with a recommended execution mode. Design Review is the most emphasized.</desc>

  <defs>
    <marker id="axar" viewBox="0 0 10 10" refX="8" refY="5" data-lint-allow="marker-footprint" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="20" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 z" fill="#5B6675"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#534AB7" flood-opacity="0.22"/>
    </filter>

    <symbol id="ic-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2.5"/><path d="M7 9l3 3-3 3"/><path d="M13 15h4"/></symbol>
    <symbol id="ic-loop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12a7.5 7.5 0 0 1 12.8-5.3L20 9"/><path d="M20 3.5V9h-5.5"/><path d="M19.5 12a7.5 7.5 0 0 1-12.8 5.3L4 15"/><path d="M4 20.5V15h5.5"/></symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6M9 9.5h2"/></symbol>
    <symbol id="ic-network" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5V13M12 13l-5 4M12 13l5 4"/></symbol>
  </defs>

  <rect x="0" y="0" width="1300" height="1070" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="44" y="30" width="6" height="42" rx="3" fill="#1F6FB2"/>
  <text x="66" y="54" font-size="32" font-weight="800" fill="#1F2733">AI Agent Task Selection Matrix</text>
  <text x="66" y="84" font-size="16" fill="#5B6675">Choose the right execution mode by scope and uncertainty</text>

  <!-- ===================== Axes ===================== -->
  <!-- Y axis (uncertainty, up) -->
  <line x1="150" y1="888" x2="150" y2="134" stroke="#5B6675" stroke-width="2" marker-end="url(#axar)"/>
  <text x="150" y="120" font-size="14" font-weight="600" fill="#3F4453" text-anchor="middle">High</text>
  <text x="150" y="908" font-size="14" font-weight="600" fill="#3F4453" text-anchor="middle">Low</text>
  <text x="52" y="510" font-size="17" font-weight="700" fill="#3F4453" text-anchor="middle" transform="rotate(-90 52 510)">Uncertainty</text>
  <!-- X axis (scope, right) -->
  <line x1="210" y1="924" x2="1244" y2="924" stroke="#5B6675" stroke-width="2" marker-end="url(#axar)"/>
  <text x="457" y="950" font-size="14" font-weight="600" fill="#3F4453" text-anchor="middle">Narrow</text>
  <text x="992" y="950" font-size="14" font-weight="600" fill="#3F4453" text-anchor="middle">Broad</text>
  <text x="725" y="986" font-size="17" font-weight="700" fill="#3F4453" text-anchor="middle">Scope</text>

  <!-- ===================== Quadrant 3 : Investigation (top-left, amber) ===================== -->
  <rect x="210" y="132" width="495" height="360" rx="16" fill="#FBF2E1" stroke="#B5771F" stroke-width="1.4"/>
  <circle cx="244" cy="168" r="17" fill="#B5771F"/>
  <text x="244" y="168" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">3</text>
  <circle cx="649" cy="186" r="30" fill="#F5E4C4"/>
  <use href="#ic-doc" x="630" y="167" width="38" height="38" style="color:#B5771F"/>
  <text x="240" y="240" font-size="26" font-weight="700" fill="#7A4E12" dominant-baseline="central">Investigation</text>
  <text x="240" y="272" font-size="14" fill="#5B6675" dominant-baseline="central">Narrow scope · high uncertainty</text>
  <line x1="238" y1="294" x2="677" y2="294" stroke="#E7D3A9" stroke-width="1"/>
  <text x="240" y="324" font-size="13" font-weight="700" fill="#9A7327" letter-spacing="1.5" dominant-baseline="central">EXAMPLES</text>
  <text x="240" y="352" font-size="16.5" fill="#1F2733" dominant-baseline="central">Bug tracing, render issue analysis,</text>
  <text x="240" y="380" font-size="16.5" fill="#1F2733" dominant-baseline="central">failure log review</text>
  <rect x="238" y="422" width="439" height="42" rx="9" fill="#F6ECD5"/>
  <text x="256" y="443" font-size="15.5" font-weight="700" fill="#7A4E12" dominant-baseline="central">Recommended · Gather evidence before editing</text>

  <!-- ===================== Quadrant 4 : Design Review (top-right, purple ACCENT) ===================== -->
  <rect x="745" y="132" width="495" height="360" rx="16" fill="#ECEBFB" stroke="#534AB7" stroke-width="2.6" filter="url(#soft)"/>
  <circle cx="779" cy="168" r="17" fill="#534AB7"/>
  <text x="779" y="168" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">4</text>
  <text x="816" y="168" font-size="12" font-weight="700" fill="#534AB7" text-anchor="start" letter-spacing="1" dominant-baseline="central">MOST CAUTION</text>
  <circle cx="1184" cy="192" r="31" fill="#534AB7"/>
  <use href="#ic-network" x="1164" y="172" width="40" height="40" style="color:#FFFFFF"/>
  <text x="775" y="244" font-size="26" font-weight="700" fill="#322B7A" dominant-baseline="central">Design Review</text>
  <text x="775" y="276" font-size="14" fill="#6B63C0" dominant-baseline="central">Broad scope · high uncertainty</text>
  <line x1="773" y1="298" x2="1212" y2="298" stroke="#C9C5F0" stroke-width="1"/>
  <text x="775" y="328" font-size="13" font-weight="700" fill="#6B63C0" letter-spacing="1.5" dominant-baseline="central">EXAMPLES</text>
  <text x="775" y="356" font-size="16.5" fill="#1F2733" dominant-baseline="central">Architecture direction, product positioning,</text>
  <text x="775" y="384" font-size="16.5" fill="#1F2733" dominant-baseline="central">workflow redesign</text>
  <rect x="773" y="426" width="439" height="42" rx="9" fill="#534AB7"/>
  <text x="791" y="447" font-size="15.5" font-weight="700" fill="#FFFFFF" dominant-baseline="central">Recommended · Cross-agent / red-team review</text>

  <!-- ===================== Quadrant 1 : Quick Fix (bottom-left, green) ===================== -->
  <rect x="210" y="528" width="495" height="360" rx="16" fill="#E7F5EF" stroke="#0F7A5F" stroke-width="1.4"/>
  <circle cx="244" cy="564" r="17" fill="#0F7A5F"/>
  <text x="244" y="564" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">1</text>
  <circle cx="649" cy="582" r="30" fill="#D3EEE2"/>
  <use href="#ic-terminal" x="630" y="563" width="38" height="38" style="color:#0F7A5F"/>
  <text x="240" y="636" font-size="26" font-weight="700" fill="#085041" dominant-baseline="central">Quick Fix</text>
  <text x="240" y="668" font-size="14" fill="#5B6675" dominant-baseline="central">Narrow scope · low uncertainty</text>
  <line x1="238" y1="690" x2="677" y2="690" stroke="#C4E6D6" stroke-width="1"/>
  <text x="240" y="720" font-size="13" font-weight="700" fill="#2E8468" letter-spacing="1.5" dominant-baseline="central">EXAMPLES</text>
  <text x="240" y="748" font-size="16.5" fill="#1F2733" dominant-baseline="central">Typos, small tests,</text>
  <text x="240" y="776" font-size="16.5" fill="#1F2733" dominant-baseline="central">simple docs cleanup</text>
  <rect x="238" y="818" width="439" height="42" rx="9" fill="#DCF0E7"/>
  <text x="256" y="839" font-size="15.5" font-weight="700" fill="#085041" dominant-baseline="central">Recommended · Run directly</text>

  <!-- ===================== Quadrant 2 : Guided Change (bottom-right, blue) ===================== -->
  <rect x="745" y="528" width="495" height="360" rx="16" fill="#EEF5FC" stroke="#1F6FB2" stroke-width="1.4"/>
  <circle cx="779" cy="564" r="17" fill="#1F6FB2"/>
  <text x="779" y="564" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">2</text>
  <circle cx="1184" cy="582" r="30" fill="#DCEBFA"/>
  <use href="#ic-loop" x="1165" y="563" width="38" height="38" style="color:#1F6FB2"/>
  <text x="775" y="636" font-size="26" font-weight="700" fill="#124267" dominant-baseline="central">Guided Change</text>
  <text x="775" y="668" font-size="14" fill="#5B6675" dominant-baseline="central">Broad scope · low uncertainty</text>
  <line x1="773" y1="690" x2="1212" y2="690" stroke="#CBDDF0" stroke-width="1"/>
  <text x="775" y="720" font-size="13" font-weight="700" fill="#2C6EA5" letter-spacing="1.5" dominant-baseline="central">EXAMPLES</text>
  <text x="775" y="748" font-size="16.5" fill="#1F2733" dominant-baseline="central">Repetitive refactors, doc restructuring,</text>
  <text x="775" y="776" font-size="16.5" fill="#1F2733" dominant-baseline="central">batch example updates</text>
  <rect x="773" y="818" width="439" height="42" rx="9" fill="#E3EFFA"/>
  <text x="791" y="839" font-size="15.5" font-weight="700" fill="#124267" dominant-baseline="central">Recommended · Plan, then execute</text>

  <!-- ===================== Bottom note ===================== -->
  <rect x="292" y="1012" width="716" height="38" rx="19" fill="#F2F4F8"/>
  <text x="650" y="1031" font-size="14.5" fill="#3F4453" text-anchor="middle" dominant-baseline="central">Rule of thumb: uncertainty decides review depth; scope decides planning depth.</text>
</svg>
