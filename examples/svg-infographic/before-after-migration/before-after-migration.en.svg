<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 760" width="1120" height="760" role="img"
     shape-rendering="geometricPrecision" text-rendering="optimizeLegibility"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
<title>Monolith to Microservices — before / after migration</title>
<desc>A two-panel before/after comparison: a monolithic application on the left with its downsides, and a microservices architecture on the right with its benefits.</desc>
<style>
  svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#DCE3EC;
    --before-fill:#FBF1E3; --before-line:#B77A26; --before-ink:#7A4F12; --before-tint:#F3E1C4;
    --after-fill:#E7F5EF; --after-line:#0F7A5F; --after-ink:#0B5E49; --after-tint:#D0EBDF;
    --app-fill:#ECEBFB; --app-line:#534AB7; --app-ink:#3C3489;
    --band:#F7FAFD; }
  text{ fill:var(--ink) }
  .sub{ fill:var(--muted) }
  .lab{ font-size:15px; font-weight:700; fill:#FFFFFF; letter-spacing:.3px }
  .pt{ font-size:17px }
  .ic{ fill:none; stroke:currentColor; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round }
</style>
<defs>
  <symbol id="ic-cross" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24"><path d="M5 13l4 4 10-11"/></symbol>
  <symbol id="ic-arrow" viewBox="0 0 24 24"><path d="M4 12h15M13 6l6 6-6 6"/></symbol>
</defs>
<rect width="1120" height="760" fill="var(--bg)"/>

<!-- header -->
<rect x="44" y="40" width="6" height="46" rx="3" fill="var(--after-line)"/>
<text x="66" y="64" style="font-size:32px;font-weight:800">Monolith → Microservices</text>
<text x="66" y="94" class="sub" style="font-size:16px">Before / after migration — one shared unit becomes independent services</text>

<!-- middle transition arrow -->
<circle cx="560" cy="420" r="22" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.5"/>
<use href="#ic-arrow" class="ic" x="546" y="406" width="28" height="28" style="color:#8A94A3;stroke-width:2"/>

<!-- ===== BEFORE band ===== -->
<rect x="44" y="124" width="496" height="596" rx="18" fill="var(--band)" stroke="var(--before-line)" stroke-width="1.2"/>
<rect x="68" y="148" width="204" height="34" rx="17" fill="var(--before-line)"/>
<text x="170" y="166" text-anchor="middle" class="lab" dominant-baseline="central">BEFORE · Monolith</text>

<!-- monolith visual -->
<rect x="68" y="202" width="448" height="120" rx="14" fill="#FFFFFF" stroke="var(--before-line)" stroke-width="1.4"/>
<text x="292" y="230" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:var(--before-ink)">Monolithic App</text>
<rect x="88" y="256" width="130" height="48" rx="9" fill="var(--before-fill)" stroke="var(--before-line)"/>
<text x="153" y="281" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:var(--before-ink)">Auth</text>
<rect x="227" y="256" width="130" height="48" rx="9" fill="var(--before-fill)" stroke="var(--before-line)"/>
<text x="292" y="281" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:var(--before-ink)">Orders</text>
<rect x="366" y="256" width="130" height="48" rx="9" fill="var(--before-fill)" stroke="var(--before-line)"/>
<text x="431" y="281" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:var(--before-ink)">Billing</text>

<!-- before points -->
<g>
  <circle cx="92" cy="366" r="16" fill="var(--before-tint)"/><use href="#ic-cross" class="ic" x="82" y="356" width="20" height="20" style="color:var(--before-ink)"/>
  <text x="124" y="366" dominant-baseline="central" class="pt">Single deploy unit</text>
  <circle cx="92" cy="424" r="16" fill="var(--before-tint)"/><use href="#ic-cross" class="ic" x="82" y="414" width="20" height="20" style="color:var(--before-ink)"/>
  <text x="124" y="424" dominant-baseline="central" class="pt">One shared database</text>
  <circle cx="92" cy="482" r="16" fill="var(--before-tint)"/><use href="#ic-cross" class="ic" x="82" y="472" width="20" height="20" style="color:var(--before-ink)"/>
  <text x="124" y="482" dominant-baseline="central" class="pt">Scale all-or-nothing</text>
  <circle cx="92" cy="540" r="16" fill="var(--before-tint)"/><use href="#ic-cross" class="ic" x="82" y="530" width="20" height="20" style="color:var(--before-ink)"/>
  <text x="124" y="540" dominant-baseline="central" class="pt">One failure → full outage</text>
  <circle cx="92" cy="598" r="16" fill="var(--before-tint)"/><use href="#ic-cross" class="ic" x="82" y="588" width="20" height="20" style="color:var(--before-ink)"/>
  <text x="124" y="598" dominant-baseline="central" class="pt">Slow, coupled releases</text>
</g>
<rect x="68" y="642" width="448" height="52" rx="12" fill="var(--before-fill)" stroke="var(--before-line)" stroke-width=".75"/>
<text x="292" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--before-ink)">One change ships the whole application</text>

<!-- ===== AFTER band ===== -->
<rect x="580" y="124" width="496" height="596" rx="18" fill="var(--band)" stroke="var(--after-line)" stroke-width="1.2"/>
<rect x="604" y="148" width="240" height="34" rx="17" fill="var(--after-line)"/>
<text x="724" y="166" text-anchor="middle" class="lab" dominant-baseline="central">AFTER · Microservices</text>

<!-- microservices visual -->
<rect x="676" y="202" width="304" height="40" rx="10" fill="var(--app-fill)" stroke="var(--app-line)" stroke-width="1.3"/>
<text x="828" y="222" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--app-ink)">API Gateway</text>
<line x1="828" y1="242" x2="828" y2="252" stroke="#8A94A3" stroke-width="1.2"/>
<line x1="672" y1="252" x2="984" y2="252" stroke="#8A94A3" stroke-width="1.2"/>
<line x1="672" y1="252" x2="672" y2="264" stroke="#8A94A3" stroke-width="1.2"/>
<line x1="828" y1="252" x2="828" y2="264" stroke="#8A94A3" stroke-width="1.2"/>
<line x1="984" y1="252" x2="984" y2="264" stroke="#8A94A3" stroke-width="1.2"/>
<rect x="604" y="264" width="136" height="58" rx="10" fill="#FFFFFF" stroke="var(--after-line)" stroke-width="1.2"/>
<text x="672" y="283" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--after-ink)">Auth</text>
<text x="672" y="304" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:11px">own DB</text>
<rect x="760" y="264" width="136" height="58" rx="10" fill="#FFFFFF" stroke="var(--after-line)" stroke-width="1.2"/>
<text x="828" y="283" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--after-ink)">Orders</text>
<text x="828" y="304" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:11px">own DB</text>
<rect x="916" y="264" width="136" height="58" rx="10" fill="#FFFFFF" stroke="var(--after-line)" stroke-width="1.2"/>
<text x="984" y="283" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--after-ink)">Billing</text>
<text x="984" y="304" text-anchor="middle" dominant-baseline="central" class="sub" style="font-size:11px">own DB</text>

<!-- after points -->
<g>
  <circle cx="628" cy="366" r="16" fill="var(--after-tint)"/><use href="#ic-check" class="ic" x="618" y="356" width="20" height="20" style="color:var(--after-line)"/>
  <text x="660" y="366" dominant-baseline="central" class="pt">Independent deploys</text>
  <circle cx="628" cy="424" r="16" fill="var(--after-tint)"/><use href="#ic-check" class="ic" x="618" y="414" width="20" height="20" style="color:var(--after-line)"/>
  <text x="660" y="424" dominant-baseline="central" class="pt">Isolated data per service</text>
  <circle cx="628" cy="482" r="16" fill="var(--after-tint)"/><use href="#ic-check" class="ic" x="618" y="472" width="20" height="20" style="color:var(--after-line)"/>
  <text x="660" y="482" dominant-baseline="central" class="pt">Scale per service</text>
  <circle cx="628" cy="540" r="16" fill="var(--after-tint)"/><use href="#ic-check" class="ic" x="618" y="530" width="20" height="20" style="color:var(--after-line)"/>
  <text x="660" y="540" dominant-baseline="central" class="pt">Fault isolation</text>
  <circle cx="628" cy="598" r="16" fill="var(--after-tint)"/><use href="#ic-check" class="ic" x="618" y="588" width="20" height="20" style="color:var(--after-line)"/>
  <text x="660" y="598" dominant-baseline="central" class="pt">Fast, decoupled releases</text>
</g>
<rect x="604" y="642" width="448" height="52" rx="12" fill="var(--after-fill)" stroke="var(--after-line)" stroke-width=".75"/>
<text x="828" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:14px;font-weight:600;fill:var(--after-ink)">Each service deploys and scales on its own</text>

<!-- legend -->
<text x="560" y="740" text-anchor="middle" class="sub" style="font-size:13.5px">amber = legacy constraint  ·  green = migration benefit</text>
</svg>
