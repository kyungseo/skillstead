<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1120" width="1080" height="1120" role="img"
     shape-rendering="geometricPrecision" text-rendering="optimizeLegibility"
     style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
<title>svg-infographic — 무엇을 만들고 어떻게 동작하나</title>
<desc>svg-infographic skill 개요: 만드는 다이어그램 종류, 확인-작성-렌더-검증 흐름, 한국어/CJK 최우선 텍스트, 크로스 플랫폼 렌더링.</desc>
<style>
  svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#DCE3EC; --primary:#1F6FB2; --pf-tint:#E3EEF8;
    --band:#F7FAFD; --no-ink:#8A3618; }
  text{ fill:var(--ink) }
  .sub{ fill:var(--muted) }
  .sec{ font-size:23px; font-weight:800 }
  .ic{ fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round }
</style>
<defs>
  <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8A94A3"/></marker>
  <symbol id="ic-network" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5V13M12 13l-5 4M12 13l5 4"/></symbol>
  <symbol id="ic-layers" viewBox="0 0 24 24"><path d="M12 3l9 5-9 5-9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 16l9 5 9-5"/></symbol>
  <symbol id="ic-flow" viewBox="0 0 24 24"><circle cx="5" cy="12" r="2.4"/><circle cx="19" cy="12" r="2.4"/><path d="M7.4 12h6.2M14 8.5l3.5 3.5-3.5 3.5"/></symbol>
  <symbol id="ic-compare" viewBox="0 0 24 24"><rect x="3" y="4" width="7" height="16" rx="1.5"/><rect x="14" y="4" width="7" height="16" rx="1.5"/></symbol>
  <symbol id="ic-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.6"/></symbol>
  <symbol id="ic-roadmap" viewBox="0 0 24 24"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></symbol>
  <symbol id="ic-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></symbol>
</defs>
<rect width="1080" height="1120" fill="var(--bg)"/>

<!-- title -->
<rect x="64" y="54" width="8" height="54" rx="4" fill="var(--primary)"/>
<text x="90" y="94" style="font-size:44px;font-weight:800">svg-infographic</text>
<text x="90" y="130" class="sub" style="font-size:20px">설명만 하면 — 깔끔한 기술 다이어그램과 공유용 PNG가 나온다.</text>

<!-- section: 다이어그램 종류 -->
<rect x="64" y="180" width="5" height="24" rx="2.5" fill="var(--primary)"/>
<text x="82" y="199" class="sec">만들 수 있는 다이어그램</text>
<g>
  <rect x="64" y="222" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="120" cy="284" r="30" fill="var(--pf-tint)"/><use href="#ic-network" class="ic" x="102" y="266" width="36" height="36" style="color:var(--primary)"/>
  <text x="170" y="278" dominant-baseline="central" style="font-size:20px;font-weight:700">토폴로지</text>
  <text x="170" y="304" class="sub" style="font-size:14px" dominant-baseline="central">구역 · 노드 · 경로</text>

  <rect x="388" y="222" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="444" cy="284" r="30" fill="var(--pf-tint)"/><use href="#ic-layers" class="ic" x="426" y="266" width="36" height="36" style="color:var(--primary)"/>
  <text x="494" y="278" dominant-baseline="central" style="font-size:20px;font-weight:700">레이어 / 온니언</text>
  <text x="494" y="304" class="sub" style="font-size:14px" dominant-baseline="central">중첩 모델</text>

  <rect x="712" y="222" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="768" cy="284" r="30" fill="var(--pf-tint)"/><use href="#ic-flow" class="ic" x="750" y="266" width="36" height="36" style="color:var(--primary)"/>
  <text x="818" y="278" dominant-baseline="central" style="font-size:20px;font-weight:700">플로우</text>
  <text x="818" y="304" class="sub" style="font-size:14px" dominant-baseline="central">프로세스 · 데이터 흐름</text>

  <rect x="64" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="120" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-compare" class="ic" x="102" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="170" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">Before / After</text>
  <text x="170" y="470" class="sub" style="font-size:14px" dominant-baseline="central">비교 패널</text>

  <rect x="388" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="444" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-grid" class="ic" x="426" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="494" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">카드</text>
  <text x="494" y="470" class="sub" style="font-size:14px" dominant-baseline="central">아이콘 · 제목 · 텍스트</text>

  <rect x="712" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="768" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-roadmap" class="ic" x="750" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="818" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">로드맵</text>
  <text x="818" y="470" class="sub" style="font-size:14px" dominant-baseline="central">단계 · 마일스톤</text>
</g>

<!-- section: 동작 방식 -->
<rect x="64" y="588" width="5" height="24" rx="2.5" fill="var(--primary)"/>
<text x="82" y="607" class="sec">동작 방식</text>
<g>
  <rect x="64" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="98" cy="670" r="17" fill="var(--primary)"/><text x="98" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">1</text>
  <text x="126" y="672" style="font-size:19px;font-weight:700">확인</text>
  <text x="88" y="714" class="sub" style="font-size:13px" dominant-baseline="central">의도 · 비율 · 언어</text>

  <rect x="310" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="344" cy="670" r="17" fill="var(--primary)"/><text x="344" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">2</text>
  <text x="372" y="672" style="font-size:19px;font-weight:700">SVG 작성</text>
  <text x="334" y="714" class="sub" style="font-size:13px" dominant-baseline="central">토큰 · CJK 폰트</text>

  <rect x="556" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="590" cy="670" r="17" fill="var(--primary)"/><text x="590" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">3</text>
  <text x="618" y="672" style="font-size:19px;font-weight:700">렌더</text>
  <text x="580" y="714" class="sub" style="font-size:13px" dominant-baseline="central">headless → 2× PNG</text>

  <rect x="802" y="632" width="214" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="836" cy="670" r="17" fill="var(--primary)"/><text x="836" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">4</text>
  <text x="864" y="672" style="font-size:19px;font-weight:700">검증</text>
  <text x="854" y="714" class="sub" style="font-size:13px" dominant-baseline="central">넘침 없음 · 글리프</text>

  <line x1="288" y1="693" x2="308" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="534" y1="693" x2="554" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="780" y1="693" x2="800" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
</g>

<!-- feature bands -->
<rect x="64" y="808" width="464" height="130" rx="16" fill="#EAF2FB" stroke="#9DBEDE" stroke-width="1.4"/>
<text x="96" y="854" style="font-size:21px;font-weight:700;fill:#1B4F7D">한국어 / CJK 최우선</text>
<text x="96" y="890" class="sub" style="font-size:15px">렌더·검증 완료, tofu 없음 — 가나다라 · ABCabc · 0123</text>

<rect x="552" y="808" width="464" height="130" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
<circle cx="602" cy="873" r="28" fill="var(--pf-tint)"/><use href="#ic-globe" class="ic" x="586" y="857" width="32" height="32" style="color:var(--primary)"/>
<text x="648" y="854" style="font-size:21px;font-weight:700">크로스 플랫폼</text>
<text x="648" y="890" class="sub" style="font-size:15px">macOS · Windows · Linux · Chrome/Edge/Chromium</text>

<!-- 비대상 -->
<rect x="64" y="984" width="952" height="52" rx="12" fill="#FBEDE7" stroke="#E4B9A6" stroke-width="1"/>
<text x="92" y="1010" dominant-baseline="central" style="font-size:15px;font-weight:700;fill:var(--no-ink)">비대상</text>
<text x="164" y="1010" dominant-baseline="central" class="sub" style="font-size:14.5px">사진 · 일러스트 · 데이터 정확 차트 · 손그림 / 크레용 스케치노트 · 마스코트·캐릭터</text>

<!-- footer -->
<text x="540" y="1082" text-anchor="middle" class="sub" style="font-size:16px">휴대 가능한 agent skill · flat, 구조적 기술 인포그래픽 — SVG 소스 + 2× PNG.</text>
</svg>
