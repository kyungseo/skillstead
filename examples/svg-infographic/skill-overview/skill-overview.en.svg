<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1100" width="1080" height="1100" role="img"
  style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>svg-infographic — what it makes and how it works</title>
  <desc>An overview of the svg-infographic skill: the diagram types it makes (topology, layer/onion, flow, before/after, cards, roadmap), a confirm–author–render–verify flow, first-class Korean/CJK text, and cross-platform rendering.</desc>
  <style>
    svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#D6E0EC; --primary:#1F6FB2; --card:#F7FAFD;
      --no-ink:#8A3618; }
    text{ fill:var(--ink) }
    .sub{ fill:var(--muted) }
  </style>
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A94A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <g id="iconset" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></g>
    <symbol id="ic-network" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5V13M12 13l-5 4M12 13l5 4"/></symbol>
    <symbol id="ic-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 16l9 5 9-5"/></symbol>
    <symbol id="ic-flow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="2.4"/><circle cx="19" cy="12" r="2.4"/><path d="M7.4 12h6.2M14 8.5l3.5 3.5-3.5 3.5"/></symbol>
    <symbol id="ic-compare" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="7" height="16" rx="1.5"/><rect x="14" y="4" width="7" height="16" rx="1.5"/></symbol>
    <symbol id="ic-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.6"/></symbol>
    <symbol id="ic-roadmap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></symbol>
    <symbol id="ic-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></symbol>
  </defs>

  <rect x="0" y="0" width="1080" height="1100" fill="var(--bg)"/>

  <!-- title -->
  <rect x="80" y="58" width="9" height="54" rx="3" fill="var(--primary)"/>
  <text x="106" y="98" style="font-size:44px;font-weight:800">svg-infographic</text>
  <text x="106" y="134" class="sub" style="font-size:21px">Describe it — get a clean technical diagram and a share-ready PNG.</text>

  <!-- diagram types -->
  <text x="80" y="200" style="font-size:24px;font-weight:700">Diagram types it makes</text>

  <!-- 2x3 grid -->
  <g font-size="20" font-weight="700">
    <!-- row1 -->
    <rect x="80" y="224" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="132" cy="284" r="28" fill="#E3EEF8"/><use href="#ic-network" x="115" y="267" width="34" height="34" style="color:#1F6FB2"/>
    <text x="176" y="278" dominant-baseline="central">Topology</text>
    <text x="176" y="304" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">zones · nodes · path</text>

    <rect x="394" y="224" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="446" cy="284" r="28" fill="#E3EEF8"/><use href="#ic-layers" x="429" y="267" width="34" height="34" style="color:#1F6FB2"/>
    <text x="490" y="278" dominant-baseline="central">Layer / Onion</text>
    <text x="490" y="304" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">nested models</text>

    <rect x="708" y="224" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="760" cy="284" r="28" fill="#E3EEF8"/><use href="#ic-flow" x="743" y="267" width="34" height="34" style="color:#1F6FB2"/>
    <text x="804" y="278" dominant-baseline="central">Flow</text>
    <text x="804" y="304" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">process · data flow</text>

    <!-- row2 -->
    <rect x="80" y="390" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="132" cy="450" r="28" fill="#E3EEF8"/><use href="#ic-compare" x="115" y="433" width="34" height="34" style="color:#1F6FB2"/>
    <text x="176" y="444" dominant-baseline="central">Before / After</text>
    <text x="176" y="470" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">comparison panels</text>

    <rect x="394" y="390" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="446" cy="450" r="28" fill="#E3EEF8"/><use href="#ic-grid" x="429" y="433" width="34" height="34" style="color:#1F6FB2"/>
    <text x="490" y="444" dominant-baseline="central">Cards</text>
    <text x="490" y="470" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">icon · title · text</text>

    <rect x="708" y="390" width="290" height="150" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="760" cy="450" r="28" fill="#E3EEF8"/><use href="#ic-roadmap" x="743" y="433" width="34" height="34" style="color:#1F6FB2"/>
    <text x="804" y="444" dominant-baseline="central">Roadmap</text>
    <text x="804" y="470" class="sub" style="font-size:14px;font-weight:400" dominant-baseline="central">phases · milestones</text>
  </g>

  <!-- how it works -->
  <text x="80" y="608" style="font-size:24px;font-weight:700">How it works</text>
  <g>
    <rect x="80" y="632" width="212" height="120" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="112" cy="668" r="17" fill="var(--primary)"/><text x="112" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">1</text>
    <text x="140" y="674" style="font-size:19px;font-weight:700">Confirm</text>
    <text x="102" y="712" class="sub" style="font-size:13px" dominant-baseline="central">intent · ratio · language</text>

    <rect x="316" y="632" width="212" height="120" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="348" cy="668" r="17" fill="var(--primary)"/><text x="348" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">2</text>
    <text x="376" y="674" style="font-size:19px;font-weight:700">Author SVG</text>
    <text x="338" y="712" class="sub" style="font-size:13px" dominant-baseline="central">tokens · CJK font</text>

    <rect x="552" y="632" width="212" height="120" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="584" cy="668" r="17" fill="var(--primary)"/><text x="584" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">3</text>
    <text x="612" y="674" style="font-size:19px;font-weight:700">Render</text>
    <text x="574" y="712" class="sub" style="font-size:13px" dominant-baseline="central">headless → 2× PNG</text>

    <rect x="788" y="632" width="210" height="120" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="820" cy="668" r="17" fill="var(--primary)"/><text x="820" y="668" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">4</text>
    <text x="848" y="674" style="font-size:19px;font-weight:700">Verify</text>
    <text x="810" y="712" class="sub" style="font-size:13px" dominant-baseline="central">no overflow · glyphs</text>

    <line x1="294" y1="692" x2="314" y2="692" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
    <line x1="530" y1="692" x2="550" y2="692" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
    <line x1="766" y1="692" x2="786" y2="692" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
  </g>

  <!-- feature bands -->
  <rect x="80" y="808" width="459" height="120" rx="16" style="fill:#EAF2FB;stroke:#9DBEDE;stroke-width:1.5"/>
  <text x="110" y="850" style="font-size:21px;font-weight:700;fill:#1B4F7D">First-class Korean / CJK</text>
  <text x="110" y="884" class="sub" style="font-size:15px">Rendered &amp; verified, never tofu — 가나다라 · ABCabc · 0123</text>

  <rect x="539" y="808" width="459" height="120" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
  <circle cx="588" cy="868" r="26" fill="#E3EEF8"/><use href="#ic-globe" x="573" y="853" width="30" height="30" style="color:#1F6FB2"/>
  <text x="628" y="850" style="font-size:21px;font-weight:700">Cross-platform</text>
  <text x="628" y="884" class="sub" style="font-size:15px">macOS · Windows · Linux · Chrome/Edge/Chromium</text>

  <!-- not for -->
  <text x="80" y="984" style="font-size:15px;font-weight:700;fill:var(--no-ink)">Not for</text>
  <text x="164" y="984" class="sub" style="font-size:15px">photos · illustration · data-accurate charts · hand-drawn / crayon sketchnote · mascots &amp; characters</text>

  <!-- footer -->
  <text x="540" y="1058" text-anchor="middle" class="sub" style="font-size:17px">A Claude Code skill · flat, structural technical infographics — SVG source + 2× PNG.</text>
</svg>
