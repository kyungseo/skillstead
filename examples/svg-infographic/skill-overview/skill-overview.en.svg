<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img"
  style="font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <title>svg-infographic — what it does and how it works</title>
  <desc>An overview of the svg-infographic skill: it turns a text description into a clean technical SVG diagram and a 2x PNG, through a confirm, author, render, and verify flow. Good for structural diagrams, not for photos, charts, or hand-drawn art.</desc>
  <style>
    svg{ --bg:#FFFFFF; --ink:#1F2733; --muted:#5B6675; --hair:#D6E0EC; --primary:#1F6FB2;
      --card:#F7FAFD;
      --ok-fill:#E7F5EF; --ok-line:#0F7A5F; --ok-ink:#0B5E49;
      --no-fill:#FBE9E4; --no-line:#C2502B; --no-ink:#8A3618; }
    text{ fill:var(--ink) }
    .sub{ fill:var(--muted) }
  </style>

  <rect x="0" y="0" width="1080" height="1350" fill="var(--bg)"/>
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8A94A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- title -->
  <rect x="80" y="58" width="9" height="54" rx="3" fill="var(--primary)"/>
  <text x="106" y="98" style="font-size:44px;font-weight:800">svg-infographic</text>
  <text x="106" y="134" class="sub" style="font-size:21px">Turn a description into a clean technical diagram — plus a share-ready PNG.</text>

  <!-- how it works -->
  <text x="80" y="204" style="font-size:24px;font-weight:700">How it works</text>

  <!-- step boxes -->
  <g>
    <rect x="80" y="230" width="212" height="158" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="112" cy="266" r="17" fill="var(--primary)"/>
    <text x="112" y="266" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">1</text>
    <text x="140" y="272" style="font-size:20px;font-weight:700">Confirm</text>
    <text x="102" y="316" class="sub" style="font-size:14px"><tspan x="102" dy="0">intent, ratio,</tspan><tspan x="102" dy="22">style, language</tspan></text>

    <rect x="316" y="230" width="212" height="158" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="348" cy="266" r="17" fill="var(--primary)"/>
    <text x="348" y="266" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">2</text>
    <text x="376" y="272" style="font-size:20px;font-weight:700">Author SVG</text>
    <text x="338" y="316" class="sub" style="font-size:14px"><tspan x="338" dy="0">color tokens,</tspan><tspan x="338" dy="22">CJK font stack</tspan></text>

    <rect x="552" y="230" width="212" height="158" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="584" cy="266" r="17" fill="var(--primary)"/>
    <text x="584" y="266" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">3</text>
    <text x="612" y="272" style="font-size:20px;font-weight:700">Render</text>
    <text x="574" y="316" class="sub" style="font-size:14px"><tspan x="574" dy="0">headless browser</tspan><tspan x="574" dy="22">→ 2× PNG</tspan></text>

    <rect x="788" y="230" width="212" height="158" rx="16" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
    <circle cx="820" cy="266" r="17" fill="var(--primary)"/>
    <text x="820" y="266" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#FFFFFF">4</text>
    <text x="848" y="272" style="font-size:20px;font-weight:700">Verify</text>
    <text x="810" y="316" class="sub" style="font-size:14px"><tspan x="810" dy="0">no overflow,</tspan><tspan x="810" dy="22">glyphs, size</tspan></text>

    <line x1="294" y1="309" x2="314" y2="309" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
    <line x1="530" y1="309" x2="550" y2="309" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
    <line x1="766" y1="309" x2="786" y2="309" stroke="#8A94A3" stroke-width="1.5" marker-end="url(#a2)"/>
  </g>

  <!-- what it's for -->
  <text x="80" y="456" style="font-size:24px;font-weight:700">What it's for</text>

  <!-- great for -->
  <rect x="80" y="484" width="440" height="322" rx="16" style="fill:var(--ok-fill);stroke:var(--ok-line);stroke-width:1.5"/>
  <text x="108" y="524" style="font-size:20px;font-weight:700;fill:var(--ok-ink)">Great for</text>
  <g style="font-size:17px" fill="var(--ok-ink)">
    <text x="112" y="562">✓  Architecture diagrams</text>
    <text x="112" y="596">✓  Cloud / network topology</text>
    <text x="112" y="630">✓  Component &amp; layer maps</text>
    <text x="112" y="664">✓  Process / data flow</text>
    <text x="112" y="698">✓  Before / after comparison</text>
    <text x="112" y="732">✓  Roadmap / risk map</text>
    <text x="112" y="766">✓  Technical one-pager</text>
  </g>

  <!-- not for -->
  <rect x="560" y="484" width="440" height="322" rx="16" style="fill:var(--no-fill);stroke:var(--no-line);stroke-width:1.5"/>
  <text x="588" y="524" style="font-size:20px;font-weight:700;fill:var(--no-ink)">Not for</text>
  <g style="font-size:17px" fill="var(--no-ink)">
    <text x="592" y="562">✕  Photo / illustration-heavy</text>
    <text x="592" y="596">✕  Statistical charts</text>
    <text x="592" y="630">✕  Hand-drawn / crayon sketchnote</text>
    <text x="592" y="664">✕  Mascots &amp; characters</text>
    <text x="592" y="698">✕  Freeform logos / icons</text>
  </g>

  <!-- you get -->
  <text x="80" y="866" style="font-size:24px;font-weight:700">You get</text>
  <rect x="80" y="894" width="440" height="82" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
  <text x="108" y="928" style="font-size:20px;font-weight:700">.svg</text>
  <text x="172" y="928" class="sub" style="font-size:17px">editable source of truth</text>
  <text x="108" y="955" class="sub" style="font-size:14px">tokens in one place → recolor in seconds</text>
  <rect x="560" y="894" width="440" height="82" rx="14" style="fill:var(--card);stroke:var(--hair);stroke-width:1.5"/>
  <text x="588" y="928" style="font-size:20px;font-weight:700">.png</text>
  <text x="652" y="928" class="sub" style="font-size:17px">crisp 2× export</text>
  <text x="588" y="955" class="sub" style="font-size:14px">for slides, docs, and social posts</text>

  <!-- CJK band -->
  <rect x="80" y="1024" width="920" height="104" rx="16" style="fill:#EAF2FB;stroke:#9DBEDE;stroke-width:1.5"/>
  <text x="112" y="1068" style="font-size:21px;font-weight:700;fill:#1B4F7D">First-class Korean / CJK text</text>
  <text x="112" y="1100" class="sub" style="font-size:16px">Rendered and verified, never tofu —  가나다라  ·  ABCabc  ·  0123</text>

  <!-- footer -->
  <text x="540" y="1200" text-anchor="middle" class="sub" style="font-size:17px">A Claude Code skill · describe it in plain language, get the diagram and the PNG.</text>
</svg>
