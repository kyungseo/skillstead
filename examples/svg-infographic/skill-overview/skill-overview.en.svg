  <circle cx="768" cy="284" r="30" fill="var(--pf-tint)"/><use href="#ic-flow" class="ic" x="750" y="266" width="36" height="36" style="color:var(--primary)"/>
  <text x="818" y="278" dominant-baseline="central" style="font-size:20px;font-weight:700">Flow</text>
  <text x="818" y="304" class="sub" style="font-size:14px" dominant-baseline="central">process · data flow</text>

  <rect x="64" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="120" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-compare" class="ic" x="102" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="170" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">Before / After</text>
