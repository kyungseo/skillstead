<!-- section: how it works -->
<rect x="64" y="588" width="5" height="24" rx="2.5" fill="var(--primary)"/>
<text x="82" y="607" class="sec">How it works</text>
<g>
  <rect x="64" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="98" cy="670" r="17" fill="var(--primary)"/><text x="98" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">1</text>
  <text x="126" y="672" style="font-size:19px;font-weight:700">Confirm</text>
  <text x="88" y="714" class="sub" style="font-size:13px" dominant-baseline="central">intent · ratio · language</text>

  <rect x="310" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="344" cy="670" r="17" fill="var(--primary)"/><text x="344" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">2</text>
  <text x="372" y="672" style="font-size:19px;font-weight:700">Author SVG</text>
  <text x="334" y="714" class="sub" style="font-size:13px" dominant-baseline="central">tokens · CJK font</text>

  <rect x="556" y="632" width="222" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="590" cy="670" r="17" fill="var(--primary)"/><text x="590" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">3</text>
  <text x="618" y="672" style="font-size:19px;font-weight:700">Render</text>
  <text x="580" y="714" class="sub" style="font-size:13px" dominant-baseline="central">headless → 2× PNG</text>

  <rect x="802" y="632" width="214" height="122" rx="16" fill="var(--band)" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="836" cy="670" r="17" fill="var(--primary)"/><text x="836" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:17px;font-weight:700;fill:#FFFFFF">4</text>
  <text x="864" y="672" style="font-size:19px;font-weight:700">Verify</text>
  <text x="854" y="714" class="sub" style="font-size:13px" dominant-baseline="central">no overflow · glyphs</text>

  <line x1="288" y1="693" x2="308" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="534" y1="693" x2="554" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
  <line x1="780" y1="693" x2="800" y2="693" stroke="#8A94A3" stroke-width="1.8" marker-end="url(#a2)"/>
