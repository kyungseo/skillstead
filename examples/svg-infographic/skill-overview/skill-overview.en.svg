  <rect x="388" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="444" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-grid" class="ic" x="426" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="494" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">Cards</text>
  <text x="494" y="470" class="sub" style="font-size:14px" dominant-baseline="central">icon · title · text</text>

  <rect x="712" y="388" width="304" height="150" rx="16" fill="#FFFFFF" stroke="var(--hair)" stroke-width="1.4"/>
  <circle cx="768" cy="450" r="30" fill="var(--pf-tint)"/><use href="#ic-roadmap" class="ic" x="750" y="432" width="36" height="36" style="color:var(--primary)"/>
  <text x="818" y="444" dominant-baseline="central" style="font-size:20px;font-weight:700">Roadmap</text>
  <text x="818" y="470" class="sub" style="font-size:14px" dominant-baseline="central">phases · milestones</text>
