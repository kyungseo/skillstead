<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350"
  role="img" style="font-family:Pretendard,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <title>Skillstead v0.8.0 svg-infographic 실행 환경 지원</title>
  <desc>Claude Code와 Codex 지원, macOS와 Windows 11 ARM64 VM 검증 범위, 강화된 SVG lint를 소개하는 소셜 인포그래픽</desc>

  <defs>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#172033" flood-opacity="0.08"/>
    </filter>

    <symbol id="ic-claude" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.9" stroke-linecap="round">
      <path d="M12 2v20M2 12h20M4.9 4.9l14.2 14.2M19.1 4.9L4.9 19.1"/>
      <path d="M7.2 2.9l9.6 18.2M21.1 7.2L2.9 16.8M16.8 2.9L7.2 21.1M21.1 16.8L2.9 7.2"/>
    </symbol>
    <symbol id="ic-codex" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2.5" y="3.5" width="19" height="17" rx="3"/>
      <path d="M6.5 8.5l3.5 3.5-3.5 3.5M12.5 15.5h5"/>
    </symbol>
    <symbol id="ic-macos" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="13" rx="2.5"/>
      <path d="M8 21h8M10 17v4M14 17v4"/>
      <path d="M9 8.5h6M9 12.5h6"/>
    </symbol>
    <symbol id="ic-windows" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 4.5l8-1.1v8.1H3zM12.5 3.2L21 2v9.5h-8.5zM3 12.8h8v8.1l-8-1.1zM12.5 12.8H21v9.4L12.5 21z"/>
    </symbol>
    <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <path d="M8 12.2l2.6 2.6 5.6-6"/>
    </symbol>
    <symbol id="ic-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2.8l7 3v5.2c0 4.6-2.9 8.2-7 10.2-4.1-2-7-5.6-7-10.2V5.8z"/>
      <path d="M8.7 12l2.2 2.2 4.6-5"/>
    </symbol>

    <linearGradient id="runtimeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2EEFF"/>
      <stop offset="1" stop-color="#F7F9FF"/>
    </linearGradient>
    <linearGradient id="platformFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#F4FBFF"/>
    </linearGradient>
  </defs>

  <style>
    svg {
      --bg:#F7F8FC;
      --ink:#172033;
      --muted:#657086;
      --hair:#DCE2EC;
      --violet:#6D55C7;
      --violet-dark:#49359B;
      --violet-soft:#EEE9FF;
      --orange:#D97732;
      --orange-soft:#FFF0E5;
      --blue:#2878D0;
      --blue-dark:#15559A;
      --blue-soft:#E5F1FF;
      --green:#178263;
      --green-soft:#E8F6F1;
      --card:#FFFFFF;
    }
    .ink { fill:var(--ink); }
    .muted { fill:var(--muted); }
    .violet { fill:var(--violet-dark); }
    .blue { fill:var(--blue-dark); }
    .green { fill:var(--green); }
    .on-accent { fill:#FFFFFF; }
    .caps { letter-spacing:1.1px; }
  </style>

  <rect width="1080" height="1350" fill="var(--bg)"/>
  <circle cx="1015" cy="86" r="154" fill="#EEE9FF" opacity="0.75"/>
  <circle cx="972" cy="110" r="82" fill="#DCEBFF" opacity="0.72"/>
  <rect x="64" y="62" width="134" height="42" rx="21" fill="var(--ink)"/>
  <text x="131" y="83" class="on-accent caps" font-size="17" font-weight="750"
    text-anchor="middle" dominant-baseline="central">v0.8.0</text>

  <rect x="64" y="132" width="6" height="104" rx="3" fill="var(--violet)"/>
  <text x="91" y="158" class="ink" font-size="50" font-weight="800">
    <tspan x="91" dy="0">Claude Code + Codex,</tspan>
    <tspan x="91" dy="63">검증된 SVG workflow</tspan>
  </text>
  <text x="91" y="280" class="muted" font-size="21" font-weight="500">
    macOS와 Windows 11 ARM64 VM에서 실제 설치·발견·2× 렌더 확인
  </text>

  <!-- Runtime support -->
  <rect x="64" y="334" width="952" height="316" rx="28" fill="url(#runtimeFill)"
    stroke="#D7CEF8" stroke-width="1.5"/>
  <rect x="92" y="360" width="232" height="42" rx="21" fill="var(--violet)"/>
  <text x="208" y="381" class="on-accent caps" font-size="17" font-weight="750"
    text-anchor="middle" dominant-baseline="central">RUNTIME SUPPORT</text>

  <rect x="92" y="426" width="430" height="178" rx="22" fill="var(--card)"
    stroke="#E5DDFB" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="152" cy="515" r="40" fill="var(--orange-soft)"/>
  <use href="#ic-claude" x="132" y="495" width="40" height="40" style="color:var(--orange)"/>
  <text x="214" y="476" class="ink" font-size="27" font-weight="780">Claude Code</text>
  <rect x="214" y="502" width="142" height="36" rx="18" fill="var(--green-soft)"/>
  <text x="285" y="520" class="green caps" font-size="15" font-weight="760"
    text-anchor="middle" dominant-baseline="central">SUPPORTED</text>
  <text x="214" y="568" class="muted" font-size="18" font-weight="520">기존 workflow 그대로</text>

  <rect x="558" y="426" width="430" height="178" rx="22" fill="var(--card)"
    stroke="#D7E5F6" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="618" cy="515" r="40" fill="#EAF0F7"/>
  <use href="#ic-codex" x="598" y="495" width="40" height="40" style="color:#25344B"/>
  <text x="680" y="476" class="ink" font-size="27" font-weight="780">Codex</text>
  <rect x="680" y="502" width="142" height="36" rx="18" fill="var(--green-soft)"/>
  <text x="751" y="520" class="green caps" font-size="15" font-weight="760"
    text-anchor="middle" dominant-baseline="central">SUPPORTED</text>
  <text x="680" y="568" class="muted" font-size="18" font-weight="520">v0.8.0에서 새롭게</text>

  <!-- Verified platforms -->
  <rect x="64" y="686" width="952" height="310" rx="28" fill="url(#platformFill)"
    stroke="#CDE1F6" stroke-width="1.5"/>
  <rect x="92" y="712" width="254" height="42" rx="21" fill="var(--blue)"/>
  <text x="219" y="733" class="on-accent caps" font-size="17" font-weight="750"
    text-anchor="middle" dominant-baseline="central">VERIFIED PLATFORMS</text>

  <rect x="92" y="778" width="430" height="170" rx="22" fill="var(--card)"
    stroke="#D5E7F8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="152" cy="863" r="40" fill="var(--blue-soft)"/>
  <text x="152" y="865" fill="var(--blue)" font-size="45" font-weight="680"
    text-anchor="middle" dominant-baseline="central">⌘</text>
  <text x="214" y="819" class="ink" font-size="27" font-weight="780">macOS</text>
  <text x="214" y="861" class="blue" font-size="19" font-weight="680">Claude Code + Codex</text>
  <use href="#ic-check" x="214" y="888" width="20" height="20" style="color:var(--green)"/>
  <text x="244" y="899" class="muted" font-size="17" font-weight="520">설치·발견·2× 렌더 검증</text>

  <rect x="558" y="778" width="430" height="170" rx="22" fill="var(--card)"
    stroke="#D5E7F8" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="618" cy="863" r="40" fill="var(--blue-soft)"/>
  <use href="#ic-windows" x="598" y="843" width="40" height="40" style="color:var(--blue)"/>
  <text x="680" y="819" class="ink" font-size="27" font-weight="780">Windows 11 ARM64</text>
  <text x="680" y="861" class="blue" font-size="19" font-weight="680">Codex App · VM verified</text>
  <use href="#ic-check" x="680" y="888" width="20" height="20" style="color:var(--green)"/>
  <text x="710" y="899" class="muted" font-size="17" font-weight="520">실제 SVG 보정·렌더 검증</text>

  <!-- Stronger lint -->
  <rect x="64" y="1032" width="952" height="218" rx="28" fill="#FFFFFF"
    stroke="var(--hair)" stroke-width="1.5"/>
  <circle cx="112" cy="1084" r="24" fill="var(--green-soft)"/>
  <use href="#ic-shield" x="98" y="1070" width="28" height="28" style="color:var(--green)"/>
  <text x="152" y="1076" class="ink" font-size="25" font-weight="780">SVG lint, 한 단계 더</text>
  <text x="152" y="1109" class="muted" font-size="17" font-weight="520">깨진 결과를 고치기 전에 source에서 먼저 잡습니다</text>

  <rect x="92" y="1142" width="276" height="72" rx="18" fill="#FFF5EE" stroke="#F3D8C5"/>
  <use href="#ic-check" x="116" y="1166" width="24" height="24" style="color:var(--orange)"/>
  <text x="154" y="1178" class="ink" font-size="18" font-weight="680"
    dominant-baseline="central">Text overflow</text>

  <rect x="384" y="1142" width="276" height="72" rx="18" fill="#F3F0FF" stroke="#DDD5FA"/>
  <use href="#ic-check" x="408" y="1166" width="24" height="24" style="color:var(--violet)"/>
  <text x="446" y="1178" class="ink" font-size="18" font-weight="680"
    dominant-baseline="central">Arrowhead 비례</text>

  <rect x="676" y="1142" width="312" height="72" rx="18" fill="#EDF7FF" stroke="#D2E6F8"/>
  <use href="#ic-check" x="700" y="1166" width="24" height="24" style="color:var(--blue)"/>
  <text x="738" y="1178" class="ink" font-size="18" font-weight="680"
    dominant-baseline="central">사라지는 connector</text>

  <text x="64" y="1301" class="ink" font-size="19" font-weight="720">Evidence-backed support</text>
  <text x="335" y="1301" class="muted" font-size="18" font-weight="520">검증과 함께 지원 범위도 넓어집니다.</text>
  <text x="1016" y="1301" class="muted caps" font-size="15" font-weight="700" text-anchor="end">SKILLSTEAD</text>
</svg>
