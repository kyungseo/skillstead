<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <style>#conns{ filter:url(#rough); }</style>
  <defs>
    <filter id="rough" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2"/>
    </filter>
    <filter id="safe" filterUnits="userSpaceOnUse" x="0" y="40" width="900" height="120">
      <feGaussianBlur stdDeviation="0.001"/>
    </filter>
  </defs>
  <rect x="20" y="60" width="120" height="70" fill="#eee"/>
  <rect x="240" y="60" width="120" height="70" fill="#eee"/>
  <g id="conns" filter="url(#safe)" stroke="#4A4438" stroke-width="2.5" fill="none">
    <path d="M140 95 L230 95"/>
    <path d="M360 95 L450 95"/>
  </g>
</svg>
